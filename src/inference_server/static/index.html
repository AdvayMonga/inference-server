<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inference Server</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #000; color: #fff; display: flex; height: 100vh; }

  .chat-panel { flex: 1; display: flex; flex-direction: column; padding: 20px; min-width: 0; }
  .chat-header { font-size: 1.3em; font-weight: bold; margin-bottom: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; }
  .message { margin-bottom: 14px; padding: 12px; border: 1px solid #333; max-width: 85%; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; }
  .message.user { margin-left: auto; border-color: #666; }
  .message.assistant { border-color: #444; }
  .message.assistant .cursor { display: inline-block; width: 7px; height: 14px; background: #fff; animation: blink 0.8s infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }

  .input-area { display: flex; gap: 8px; margin-top: 10px; }
  .input-area textarea { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 12px; font-family: monospace; font-size: 14px; resize: none; height: 48px; }
  .input-area textarea:focus { outline: none; border-color: #888; }
  .input-area button { background: #fff; color: #000; border: none; padding: 12px 24px; font-family: monospace; font-size: 14px; font-weight: bold; cursor: pointer; }
  .input-area button:hover { background: #ccc; }
  .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Wider sidebar */
  .sidebar { width: 400px; background: #0a0a0a; padding: 20px; overflow-y: auto; border-left: 1px solid #333; }
  .sidebar h2 { font-size: 1em; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; letter-spacing: 1px; }

  /* Larger metrics */
  .metric { margin-bottom: 12px; }
  .metric-label { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-value { font-size: 1.8em; font-weight: bold; }
  .metric-unit { font-size: 0.55em; color: #555; }
  .divider { border-top: 1px solid #333; margin: 18px 0; }

  /* Two-column metric grid */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .cache-bar { height: 8px; background: #222; margin-top: 6px; border-radius: 2px; }
  .cache-bar-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.3s; }

  .settings-section { margin-top: 8px; }
  .settings-section label { display: block; font-size: 0.75em; color: #888; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .settings-section input, .settings-section select { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 8px; font-family: monospace; font-size: 13px; margin-bottom: 10px; }

  /* Simulator buttons */
  .sim-btn { flex: 1; border: none; padding: 10px; font-family: monospace; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; }
  .sim-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sim-btn.start { background: #fff; color: #000; }
  .sim-btn.start:hover:not(:disabled) { background: #ccc; }
  .sim-btn.stop { background: #333; color: #fff; }
  .sim-btn.stop:hover:not(:disabled) { background: #555; }

  .sim-status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .sim-status-indicator.running { background: #0f0; }
  .sim-status-indicator.stopped { background: #555; }
</style>
</head>
<body>

<div class="chat-panel">
  <div class="chat-header">inference-server</div>
  <div class="chat-messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<div class="sidebar">
  <h2>LAST REQUEST</h2>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">TTFT</div><div class="metric-value" id="m-ttft">-<span class="metric-unit"> ms</span></div></div>
    <div class="metric"><div class="metric-label">TPOT</div><div class="metric-value" id="m-tpot">-<span class="metric-unit"> ms</span></div></div>
    <div class="metric"><div class="metric-label">Tokens</div><div class="metric-value" id="m-tokens">-</div></div>
    <div class="metric"><div class="metric-label">Tokens/sec</div><div class="metric-value" id="m-tps">-</div></div>
  </div>
  <div class="metric"><div class="metric-label">Total Time</div><div class="metric-value" id="m-total">-<span class="metric-unit"> ms</span></div></div>

  <div class="divider"></div>
  <h2>KV CACHE</h2>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Hit Rate</div><div class="metric-value" id="m-hitrate">-<span class="metric-unit"> %</span></div></div>
    <div class="metric"><div class="metric-label">Hits / Misses</div><div class="metric-value" id="m-hitmiss" style="font-size:1.3em">- / -</div></div>
  </div>
  <div class="metric"><div class="metric-label">Evictions</div><div class="metric-value" id="m-evictions">-</div></div>
  <div class="metric">
    <div class="metric-label">Utilization</div>
    <div class="cache-bar"><div class="cache-bar-fill" id="m-util-bar" style="width:0%"></div></div>
  </div>

  <div class="divider"></div>
  <h2>SETTINGS</h2>
  <div class="settings-section">
    <div class="metric-grid">
      <div><label>Max Tokens</label><input type="number" id="s-max-tokens" value="256" min="1" max="4096"></div>
      <div><label>Stream</label><select id="s-stream"><option value="true" selected>On</option><option value="false">Off</option></select></div>
    </div>
  </div>

  <div class="divider"></div>
  <h2>LOAD SIMULATOR</h2>
  <div class="settings-section">
    <div class="metric-grid">
      <div><label>Simulated Users</label><input type="number" id="sim-users" value="4" min="1" max="16"></div>
      <div><label>Max Tokens</label><input type="number" id="sim-tokens" value="64" min="1" max="512"></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="sim-btn start" id="simStartBtn" onclick="simStart()">START</button>
    <button class="sim-btn stop" id="simStopBtn" onclick="simStop()" disabled>STOP</button>
  </div>
  <div id="sim-status" style="display:none">
    <div class="metric" style="margin-bottom:14px">
      <div class="metric-label">Status</div>
      <div class="metric-value" style="font-size:1.1em"><span class="sim-status-indicator stopped" id="sim-dot"></span><span id="sim-state">Stopped</span></div>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Requests Done</div><div class="metric-value" id="sim-reqs">0</div></div>
      <div class="metric"><div class="metric-label">Elapsed</div><div class="metric-value" id="sim-elapsed">-<span class="metric-unit"> s</span></div></div>
      <div class="metric"><div class="metric-label">Avg TTFT</div><div class="metric-value" id="sim-ttft">-<span class="metric-unit"> ms</span></div></div>
      <div class="metric"><div class="metric-label">Avg TPOT</div><div class="metric-value" id="sim-tpot">-<span class="metric-unit"> ms</span></div></div>
    </div>
    <div class="metric"><div class="metric-label">Background Throughput</div><div class="metric-value" id="sim-tps">-<span class="metric-unit"> tok/s</span></div></div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let generating = false;

async function send() {
  const text = inputEl.value.trim();
  if (!text || generating) return;
  generating = true;
  sendBtn.disabled = true;
  inputEl.value = '';

  addMessage(text, 'user');
  const el = addMessage('', 'assistant');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);

  const maxTokens = parseInt(document.getElementById('s-max-tokens').value) || 256;
  const stream = document.getElementById('s-stream').value === 'true';
  const t0 = performance.now();
  let tokens = 0, ttft = null, t1 = null, rawText = '';

  if (stream) {
    try {
      const r = await fetch('/generate', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text, max_tokens: maxTokens, stream: true})
      });
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += dec.decode(value, {stream: true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const d = line.slice(6);
          if (d === '[DONE]') break;
          if (d.startsWith('{') && d.includes('ttft_ms')) {
            try { ttft = JSON.parse(d).ttft_ms; t1 = performance.now(); } catch(e) {}
            continue;
          }
          if (!t1) t1 = performance.now();
          tokens++;
          rawText += d;
          cursor.remove();
          el.innerHTML = renderMd(rawText);
          el.appendChild(cursor);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    } catch(e) { el.textContent += '\n[Error: ' + e.message + ']'; }
  } else {
    try {
      const r = await fetch('/generate', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text, max_tokens: maxTokens, stream: false})
      });
      const d = await r.json();
      el.innerHTML = renderMd(d.text);
      tokens = d.tokens_generated;
      ttft = d.ttft_ms;
    } catch(e) { el.textContent = '[Error: ' + e.message + ']'; }
  }

  cursor.remove();
  const total = performance.now() - t0;
  const tpot = tokens > 1 ? (total - (ttft || 0)) / (tokens - 1) : 0;
  const tps = tokens > 0 ? tokens / (total / 1000) : 0;

  document.getElementById('m-ttft').innerHTML = (ttft != null ? ttft.toFixed(0) : '-') + '<span class="metric-unit"> ms</span>';
  document.getElementById('m-tpot').innerHTML = tpot.toFixed(1) + '<span class="metric-unit"> ms</span>';
  document.getElementById('m-tokens').textContent = tokens;
  document.getElementById('m-total').innerHTML = total.toFixed(0) + '<span class="metric-unit"> ms</span>';
  document.getElementById('m-tps').textContent = tps.toFixed(1);

  try {
    const c = await (await fetch('/cache/stats')).json();
    document.getElementById('m-hitrate').innerHTML = (c.hit_rate * 100).toFixed(1) + '<span class="metric-unit"> %</span>';
    document.getElementById('m-hitmiss').textContent = c.hit_count + ' / ' + c.miss_count;
    document.getElementById('m-evictions').textContent = c.eviction_count;
    document.getElementById('m-util-bar').style.width = (c.utilization * 100) + '%';
  } catch(e) {}

  generating = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function renderMd(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<b style="font-size:1.1em">$1</b>')
    .replace(/^## (.+)$/gm, '<b style="font-size:1.2em">$1</b>')
    .replace(/^# (.+)$/gm, '<b style="font-size:1.3em">$1</b>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/`(.+?)`/g, '<code style="background:#222;padding:2px 4px">$1</code>')
    .replace(/^- (.+)$/gm, '&bull; $1')
    .replace(/^---$/gm, '<hr style="border-color:#333">')
    .replace(/\n/g, '<br>');
}

function addMessage(text, role) {
  const el = document.createElement('div');
  el.className = 'message ' + role;
  if (role === 'user') el.textContent = text;
  else el.innerHTML = renderMd(text);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

// --- Load Simulator ---
let simPolling = null;

async function simStart() {
  const users = parseInt(document.getElementById('sim-users').value) || 4;
  const tokens = parseInt(document.getElementById('sim-tokens').value) || 64;
  try {
    const r = await fetch('/simulate/start', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({num_users: users, max_tokens: tokens})
    });
    if (!r.ok) return;
    document.getElementById('sim-status').style.display = 'block';
    document.getElementById('simStartBtn').disabled = true;
    document.getElementById('simStopBtn').disabled = false;
    document.getElementById('sim-dot').className = 'sim-status-indicator running';
    document.getElementById('sim-state').textContent = 'Running';
    simPolling = setInterval(simPoll, 1000);
  } catch(e) {}
}

async function simStop() {
  try { await fetch('/simulate/stop', {method: 'POST'}); } catch(e) {}
  if (simPolling) { clearInterval(simPolling); simPolling = null; }
  document.getElementById('simStartBtn').disabled = false;
  document.getElementById('simStopBtn').disabled = true;
  document.getElementById('sim-dot').className = 'sim-status-indicator stopped';
  document.getElementById('sim-state').textContent = 'Stopped';
}

async function simPoll() {
  try {
    const s = await (await fetch('/simulate/status')).json();
    document.getElementById('sim-state').textContent = s.running ? 'Running' : 'Stopped';
    document.getElementById('sim-dot').className = 'sim-status-indicator ' + (s.running ? 'running' : 'stopped');
    document.getElementById('sim-reqs').textContent = s.requests_completed;
    document.getElementById('sim-ttft').innerHTML = s.avg_ttft_ms.toFixed(0) + '<span class="metric-unit"> ms</span>';
    document.getElementById('sim-tpot').innerHTML = s.avg_tpot_ms.toFixed(1) + '<span class="metric-unit"> ms</span>';
    document.getElementById('sim-tps').innerHTML = s.tokens_per_sec.toFixed(1) + '<span class="metric-unit"> tok/s</span>';
    document.getElementById('sim-elapsed').innerHTML = s.elapsed_s.toFixed(0) + '<span class="metric-unit"> s</span>';
    if (!s.running) simStop();
  } catch(e) {}
}
</script>
</body>
</html>
